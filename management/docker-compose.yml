services:
  prometheus:
    env_file:
      - ../.env
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    network_mode: host                                     # 访问 tailscale0 抓取节点
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.listen-address=127.0.0.1:4230'
      - '--web.external-url=${PROMETHEUS_EXTERNAL_URL:-/prometheus}'                        # 内部路由在 /，nginx 剥前缀
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus

  grafana:
    env_file:
      - ../.env
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    network_mode: host                                     # 与 Prometheus 同一网络栈，直接 localhost:4230
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=4231                           # host 模式下用此代替 ports 映射
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://example.com/grafana}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  prometheus_data:
  grafana_data:
