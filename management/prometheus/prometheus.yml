global:
  scrape_interval:     30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # 边缘节点（通过 Tailscale IP 抓取，Node Registry cron 更新此文件）
  - job_name: 'hives'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/nodes.json'
        refresh_interval: 60s
    scrape_timeout: 10s
    relabel_configs:
      # 用 hostname label 替换 instance（显示 hive-a4b2c1 而非 100.x.x.x:9100）
      - source_labels: [__meta_hostname]
        target_label: instance
      - source_labels: [__meta_mac6]
        target_label: mac6

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 中国 VPS 自身（Grafana 所在机器）
  - job_name: 'management-server'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'management'
