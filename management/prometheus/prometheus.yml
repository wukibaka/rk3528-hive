global:
  scrape_interval:     30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # 边缘节点（通过 Tailscale IP 抓取，Node Registry cron 每分钟更新此文件）
  # nodes.json 中的 hostname 标签在此被重命名为 instance，避免被 __address__ 覆盖
  - job_name: 'hives'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/nodes.json'
        refresh_interval: 60s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [hostname]
        target_label: instance

  # Prometheus 自身（--web.route-prefix=/ 后内部路径为 /metrics）
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 管理 VPS 自身（host.docker.internal 指向宿主机，需 extra_hosts: host-gateway）
  - job_name: 'management-server'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          instance: 'management'
